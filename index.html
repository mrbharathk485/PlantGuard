<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PlantGuard • AI Plant Health Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
        }
        
        .scan-line { 
            animation: scan 1.8s linear infinite; 
        }
        @keyframes scan { 
            0% { top: -100%; } 
            100% { top: 100%; } 
        }
        
        .nav-active { 
            background-color: #10b981; 
            color: white; 
            box-shadow: 0 10px 15px -3px rgb(16 185 129 / 0.3); 
        }
        
        .card-hover:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 20px 25px -5px rgb(16 185 129 / 0.25); 
        }

        #camera {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .camera-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 5;
            background: #000;
            overflow: hidden;
            border-radius: 0;
        }

        button:active {
            transform: scale(0.95);
            transition: all 0.1s;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 via-teal-50 to-cyan-50 min-h-screen">

<div class="flex h-screen overflow-hidden">

    <!-- Desktop Sidebar -->
    <div class="w-72 bg-white border-r border-emerald-100 shadow-xl hidden lg:flex flex-col">
        <div class="p-6 border-b">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-gradient-to-br from-emerald-600 to-teal-600 rounded-2xl flex items-center justify-center text-3xl">🌱</div>
                <h1 class="text-3xl font-bold text-emerald-800">PlantGuard</h1>
            </div>
        </div>
        <div class="flex-1 overflow-auto p-6">
            <h3 class="font-semibold text-emerald-700 mb-4">Recent Scans</h3>
            <div id="sidebar-history" class="space-y-3"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- Mobile Top Bar -->
        <div class="lg:hidden bg-white border-b px-4 py-4 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-gradient-to-br from-emerald-600 to-teal-600 rounded-2xl flex items-center justify-center text-2xl">🌱</div>
                <h1 class="text-2xl font-bold text-emerald-800">PlantGuard</h1>
            </div>
            <button onclick="goToHome()" class="text-emerald-600">
                <i class="fas fa-home text-xl"></i>
            </button>
        </div>

        <!-- Mobile Tab Navigation -->
        <div class="bg-white border-b px-4 py-3 flex gap-2 overflow-x-auto lg:hidden">
            <button onclick="switchTab(0)" id="tab-0" class="nav-active flex-1 py-3 px-6 rounded-3xl text-sm font-semibold">Scanner</button>
            <button onclick="switchTab(1)" id="tab-1" class="flex-1 py-3 px-6 rounded-3xl text-sm font-semibold">Report</button>
            <button onclick="switchTab(2)" id="tab-2" class="flex-1 py-3 px-6 rounded-3xl text-sm font-semibold">History</button>
        </div>

        <div class="flex-1 overflow-auto p-4 md:p-8" id="main-area">

            <!-- SCANNER TAB -->
            <div id="scanner-tab">
                <div class="bg-white rounded-3xl shadow-2xl overflow-hidden max-w-2xl mx-auto card-hover">
                    <div class="p-6 border-b bg-gradient-to-r from-emerald-50 to-white">
                        <h2 class="text-2xl font-semibold text-emerald-800 text-center">Live Plant Scanner</h2>
                    </div>
                    
                    <div id="start-screen" class="p-8 md:p-16 text-center">
                        <div class="mx-auto w-36 h-36 md:w-44 md:h-44 bg-emerald-100 rounded-full flex items-center justify-center text-8xl mb-10">📸</div>
                        <input id="plant-name" type="text" placeholder="Plant Name (e.g. Monstera)" 
                               class="w-full max-w-xs mx-auto block px-6 py-4 rounded-3xl border border-emerald-200 focus:border-emerald-500 outline-none mb-8 text-center text-lg">
                        <div class="flex flex-col sm:flex-row gap-4 max-w-xs mx-auto">
                            <button onclick="startCamera()" 
                                    class="flex-1 bg-emerald-600 hover:bg-emerald-700 text-white rounded-3xl py-6 text-lg font-semibold flex items-center justify-center gap-3">
                                <i class="fas fa-camera"></i> Open Camera
                            </button>
                            <label class="flex-1 bg-white border-2 border-emerald-600 text-emerald-600 rounded-3xl py-6 text-lg font-semibold flex items-center justify-center gap-3 cursor-pointer">
                                <i class="fas fa-upload"></i> Upload Photo
                                <input type="file" id="image-upload" accept="image/*" class="hidden" onchange="handleImageUpload(event)">
                            </label>
                        </div>
                    </div>

                    <!-- Camera Error -->
                    <div id="camera-error" class="hidden p-8 text-center">
                        <div class="text-6xl mb-6">📷</div>
                        <h3 class="text-xl font-semibold mb-2">Camera Access Needed</h3>
                        <p id="error-message" class="text-gray-600 mb-6">Please allow camera permission to scan your plant.</p>
                        <button onclick="startCamera()" 
                                class="bg-emerald-600 text-white px-8 py-4 rounded-3xl font-semibold">Try Again</button>
                    </div>

                    <!-- Camera View -->
                    <div id="camera-container" class="hidden relative">
                        <div class="camera-wrapper">
                            <video id="camera" autoplay playsinline></video>
                            <div id="scan-overlay" class="hidden absolute inset-0 bg-gradient-to-b from-transparent via-white/40 to-transparent scan-line"></div>
                        </div>
                        <div class="absolute bottom-8 left-1/2 -translate-x-1/2 z-20">
                            <button onclick="capturePhoto()" 
                                    class="bg-white text-emerald-700 px-16 py-6 rounded-3xl font-bold text-xl shadow-2xl flex items-center gap-3">
                                <i class="fas fa-camera"></i> CAPTURE
                            </button>
                        </div>
                    </div>

                    <!-- Photo Preview -->
                    <div id="photo-preview" class="hidden p-6">
                        <img id="captured-image" class="w-full rounded-3xl border border-emerald-100 max-h-[420px] object-contain bg-black">
                        <div class="grid grid-cols-2 gap-4 mt-8">
                            <button onclick="retakePhoto()" 
                                    class="py-5 border-2 border-gray-300 rounded-3xl font-medium">Retake</button>
                            <button onclick="analyzeCapturedPhoto()" 
                                    class="py-5 bg-emerald-600 text-white rounded-3xl font-semibold">ANALYZE WITH AI</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- REPORT TAB -->
            <div id="report-tab" class="hidden">
                <div class="bg-white rounded-3xl shadow-2xl p-5 md:p-8 max-w-3xl mx-auto">
                    <button onclick="goToHome()" class="mb-6 flex items-center gap-2 text-emerald-600 hover:text-emerald-700">
                        <i class="fas fa-arrow-left"></i> Back to Scanner
                    </button>

                    <div class="flex flex-col md:flex-row justify-between items-start gap-6 mb-8">
                        <div>
                            <h2 class="text-3xl font-bold text-emerald-800">Analysis Report</h2>
                            <p id="scan-date" class="text-emerald-600"></p>
                        </div>
                        <div class="text-center md:text-right">
                            <div id="health-score-big" class="text-6xl md:text-7xl font-bold text-emerald-600"></div>
                            <div class="text-sm text-emerald-500">HEALTH SCORE</div>
                        </div>
                    </div>

                    <div id="health-category" class="inline-flex px-8 py-4 rounded-3xl text-xl font-semibold mb-10"></div>

                    <div class="grid grid-cols-3 gap-4 mb-10">
                        <div class="bg-blue-50 rounded-3xl p-6 text-center card-hover">
                            <div class="text-5xl">💧</div>
                            <div id="water-val" class="text-5xl font-bold mt-4"></div>
                            <div class="text-blue-600 text-sm">Water</div>
                        </div>
                        <div class="bg-amber-50 rounded-3xl p-6 text-center card-hover">
                            <div class="text-5xl">🦴</div>
                            <div id="calcium-val" class="text-5xl font-bold mt-4"></div>
                            <div class="text-amber-600 text-sm">Calcium</div>
                        </div>
                        <div class="bg-purple-50 rounded-3xl p-6 text-center card-hover">
                            <div class="text-5xl">💪</div>
                            <div id="strength-val" class="text-5xl font-bold mt-4"></div>
                            <div class="text-purple-600 text-sm">Strength</div>
                        </div>
                    </div>

                    <div class="mb-10">
                        <h4 class="font-medium mb-3">Nutrient Radar</h4>
                        <canvas id="nutrientChart" height="210"></canvas>
                    </div>

                    <div class="mb-10 overflow-x-auto">
                        <table class="w-full min-w-[520px]">
                            <thead class="bg-emerald-50">
                                <tr>
                                    <th class="text-left p-4">Parameter</th>
                                    <th class="text-center p-4">Value</th>
                                    <th class="text-center p-4">Status</th>
                                    <th class="text-left p-4">Recommendation</th>
                                </tr>
                            </thead>
                            <tbody id="analysis-table" class="divide-y text-sm"></tbody>
                        </table>
                    </div>

                    <div>
                        <h4 class="font-semibold mb-4">Detected Issues</h4>
                        <div id="chemicals-grid" class="grid grid-cols-1 md:grid-cols-3 gap-5"></div>
                    </div>
                </div>
            </div>

            <!-- HISTORY TAB -->
            <div id="history-tab" class="hidden">
                <div class="bg-white rounded-3xl shadow-2xl p-5 md:p-8 max-w-3xl mx-auto">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-emerald-800">Scan History</h2>
                        <button onclick="clearHistory()" class="text-rose-500 flex items-center gap-2">
                            <i class="fas fa-trash"></i> Clear
                        </button>
                    </div>
                    <div id="full-history" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Mobile Bottom Nav -->
<div class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-2xl lg:hidden z-50">
    <div class="flex justify-around py-3">
        <button onclick="switchTab(0)" class="flex flex-col items-center text-emerald-600"><i class="fas fa-camera text-2xl"></i><span class="text-xs">Scan</span></button>
        <button onclick="switchTab(1)" class="flex flex-col items-center text-gray-500"><i class="fas fa-file-medical text-2xl"></i><span class="text-xs">Report</span></button>
        <button onclick="switchTab(2)" class="flex flex-col items-center text-gray-500"><i class="fas fa-history text-2xl"></i><span class="text-xs">History</span></button>
    </div>
</div>

<script>
let stream = null;
let capturedImageData = null;
let currentChart = null;
let history = JSON.parse(localStorage.getItem('plantHistory')) || [];

function switchTab(tab) {
    document.querySelectorAll('#main-area > div').forEach((el, i) => el.classList.toggle('hidden', i !== tab));
    document.querySelectorAll('#tab-0, #tab-1, #tab-2').forEach((btn, i) => btn.classList.toggle('nav-active', i === tab));
}

function goToHome() { switchTab(0); }

function saveToHistory(data) {
    history.unshift(data);
    if (history.length > 25) history.pop();
    localStorage.setItem('plantHistory', JSON.stringify(history));
    renderHistory();
}

function renderHistory() {
    let sidebarHTML = '';
    history.slice(0, 5).forEach((item, i) => {
        sidebarHTML += `
            <div onclick="loadReport(${i})" class="bg-emerald-50 hover:bg-emerald-100 p-4 rounded-2xl cursor-pointer transition">
                <div class="flex justify-between"><div class="font-medium">${item.plantName}</div><div class="font-bold text-emerald-600">${item.health}</div></div>
                <div class="text-xs text-gray-500">${item.date}</div>
            </div>`;
    });
    document.getElementById('sidebar-history').innerHTML = sidebarHTML || '<p class="text-gray-400 text-center py-8">No scans yet</p>';

    let fullHTML = '';
    history.forEach((item, i) => {
        const color = item.health >= 85 ? 'emerald' : item.health >= 70 ? 'amber' : 'rose';
        fullHTML += `
            <div onclick="loadReport(${i})" class="border border-emerald-100 rounded-3xl p-6 flex justify-between items-center hover:bg-emerald-50 cursor-pointer transition">
                <div>
                    <div class="font-semibold">${item.plantName}</div>
                    <div class="text-xs text-gray-500">${item.date}</div>
                </div>
                <div class="text-right">
                    <div class="text-4xl font-bold text-${color}-600">${item.health}</div>
                </div>
            </div>`;
    });
    document.getElementById('full-history').innerHTML = fullHTML || `<p class="text-center py-20 text-gray-400">No scans yet. Start scanning!</p>`;
}

function loadReport(index) {
    if (history[index]) {
        switchTab(1);
        displayResults(history[index]);
    }
}

async function startCamera() {
    document.getElementById('camera-error').classList.add('hidden');
    try {
        if (stream) {
            stream.getTracks().forEach(t => t.stop());
        }
        
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            } 
        });
        
        const video = document.getElementById('camera');
        video.srcObject = stream;
        await video.play();

        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('camera-container').classList.remove('hidden');
    } catch (err) {
        console.error(err);
        document.getElementById('camera-error').classList.remove('hidden');
        document.getElementById('error-message').textContent = 
            err.name === "NotAllowedError" 
                ? "Please allow camera access in your browser settings." 
                : "Camera access failed. Please try again.";
    }
}

function handleImageUpload(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            capturedImageData = ev.target.result;
            document.getElementById('captured-image').src = capturedImageData;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('photo-preview').classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    }
}

function capturePhoto() {
    const video = document.getElementById('camera');
    if (!video.videoWidth) return;

    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    
    capturedImageData = canvas.toDataURL('image/jpeg', 0.95);
    document.getElementById('captured-image').src = capturedImageData;

    document.getElementById('camera-container').classList.add('hidden');
    document.getElementById('photo-preview').classList.remove('hidden');
}

function retakePhoto() {
    document.getElementById('photo-preview').classList.add('hidden');
    document.getElementById('start-screen').classList.remove('hidden');
}

function analyzeCapturedPhoto() {
    document.getElementById('scan-overlay').classList.remove('hidden');
    setTimeout(() => {
        document.getElementById('scan-overlay').classList.add('hidden');
        generateResults();
    }, 1650);
}

function generateResults() {
    const plantName = document.getElementById('plant-name').value.trim() || "My Plant";
    const health = 76 + Math.floor(Math.random() * 23);
    const dateStr = new Date().toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });

    const data = {
        plantName: plantName,
        date: dateStr,
        health: health,
        water: 78 + Math.floor(Math.random() * 20),
        calcium: 68 + Math.floor(Math.random() * 28),
        strength: 72 + Math.floor(Math.random() * 22)
    };

    saveToHistory(data);
    displayResults(data);
    switchTab(1);
}

function displayResults(data) {
    document.getElementById('scan-date').textContent = data.date;
    document.getElementById('health-score-big').textContent = data.health;

    const catHTML = data.health >= 85 
        ? `<span class="bg-emerald-100 text-emerald-700 px-8 py-4 rounded-3xl">🌟 Healthy & Thriving</span>` 
        : `<span class="bg-amber-100 text-amber-700 px-8 py-4 rounded-3xl">⚠️ Needs Attention</span>`;
    document.getElementById('health-category').innerHTML = catHTML;

    document.getElementById('water-val').textContent = data.water;
    document.getElementById('calcium-val').textContent = data.calcium;
    document.getElementById('strength-val').textContent = data.strength;

    document.getElementById('analysis-table').innerHTML = `
        <tr><td class="p-4">Nitrogen</td><td class="text-center">${82 + Math.floor(Math.random()*13)}%</td><td class="text-center text-emerald-600">Good</td><td class="text-xs">Maintain current fertilizer</td></tr>
        <tr><td class="p-4">Phosphorus</td><td class="text-center">${70 + Math.floor(Math.random()*20)}%</td><td class="text-center text-amber-600">Fair</td><td class="text-xs">Add bone meal</td></tr>
        <tr><td class="p-4">Calcium</td><td class="text-center">${data.calcium}%</td><td class="text-center text-amber-600">Low</td><td class="text-xs">Apply eggshell powder</td></tr>
    `;

    document.getElementById('chemicals-grid').innerHTML = `
        <div class="bg-emerald-50 p-6 rounded-3xl text-center">✅ No pesticide detected</div>
        <div class="bg-amber-50 p-6 rounded-3xl text-center">Mild Nitrogen Deficiency</div>
        <div class="bg-teal-50 p-6 rounded-3xl text-center">pH Level: 6.4 (Ideal)</div>
    `;

    if (currentChart) currentChart.destroy();
    currentChart = new Chart(document.getElementById('nutrientChart'), {
        type: 'radar',
        data: {
            labels: ['N', 'P', 'K', 'Mg', 'Ca', 'Fe'],
            datasets: [{
                data: [84, 73, 89, 77, data.calcium, 68],
                backgroundColor: 'rgba(16, 185, 129, 0.2)',
                borderColor: '#10b981',
                borderWidth: 3.5
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { r: { min: 0, max: 100, ticks: { stepSize: 20 } } }
        }
    });
}

function clearHistory() {
    if (confirm("Clear all scan history?")) {
        history = [];
        localStorage.setItem('plantHistory', JSON.stringify(history));
        renderHistory();
    }
}

window.onload = () => {
    renderHistory();
    switchTab(0);
};
</script>
</body>
</html>
