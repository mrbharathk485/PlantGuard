<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EduPath • Complete After 10th Guide 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
        }
        
        .card-hover {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px -12px rgb(29 78 216 / 0.25);
        }
        
        .branch-img {
            height: 220px;
            object-fit: cover;
            border-radius: 20px 20px 0 0;
            transition: transform 0.5s ease;
        }
        
        .branch-card:hover .branch-img {
            transform: scale(1.06);
        }
        
        .nav-button {
            transition: all 0.3s ease;
        }
        
        /* Responsive Typography & Spacing */
        @media (max-width: 640px) {
            .branch-img { height: 195px; }
            h1 { font-size: 2.1rem; }
            h2 { font-size: 1.75rem; }
            .detail-img { height: 260px; }
        }
        
        @media (min-width: 641px) and (max-width: 1024px) {
            .branch-img { height: 240px; }
        }
        
        @media (min-width: 1025px) {
            .branch-img { height: 270px; }
            .detail-img { height: 420px; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-50 min-h-screen">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 lg:py-10">

    <!-- Header -->
    <div class="flex justify-between items-center mb-10 lg:mb-16">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 lg:w-16 lg:h-16 bg-gradient-to-br from-blue-700 to-indigo-600 rounded-3xl flex items-center justify-center text-4xl lg:text-5xl shadow-xl">🎓</div>
            <div>
                <h1 class="text-3xl lg:text-5xl font-bold text-blue-950">Future Education Path</h1>
                <p class="text-blue-600 font-medium text-base lg:text-lg">After 10th Complete Guidance 2026</p>
            </div>
        </div>
        <button onclick="goHome()" 
                class="nav-button px-6 py-3.5 bg-white rounded-3xl shadow-md font-semibold text-blue-700 flex items-center gap-3 hover:bg-blue-50 active:scale-95">
            <i class="fas fa-home"></i> 
            <span class="hidden sm:inline">Home</span>
        </button>
    </div>

    <!-- Step 1: Choose Path -->
    <div id="step1">
        <div class="text-center mb-12 lg:mb-16">
            <h2 class="text-3xl lg:text-5xl font-bold text-blue-900 leading-tight">What do you want to do after 10th?</h2>
            <p class="mt-4 text-gray-600 text-base lg:text-xl max-w-2xl mx-auto">Select a path and explore detailed branches, jobs & future options</p>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5 lg:gap-8" id="paths-grid"></div>
    </div>

    <!-- Step 2: Branches List -->
    <div id="step2" class="hidden">
        <button onclick="goBack()" 
                class="mb-8 flex items-center gap-3 text-blue-700 hover:text-blue-800 font-medium text-lg nav-button">
            <i class="fas fa-arrow-left"></i> Back to Paths
        </button>
        <h2 id="step2-title" class="text-3xl lg:text-5xl font-bold text-center mb-10"></h2>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 lg:gap-8" id="branches-grid"></div>
    </div>

    <!-- Step 3: Branch Detail -->
    <div id="step3" class="hidden">
        <button onclick="goBackToStep2()" 
                class="mb-8 flex items-center gap-3 text-blue-700 hover:text-blue-800 font-medium text-lg nav-button">
            <i class="fas fa-arrow-left"></i> Back to Branches
        </button>
        <div id="detail-content" class="bg-white rounded-3xl shadow-2xl overflow-hidden"></div>
    </div>
</div>

<script>
// ==================== DATA (Original Images Kept Unchanged) ====================
const pathsData = {
    ITI: {
        icon: "🔧",
        title: "ITI (Industrial Training Institute)",
        desc: "1-2 Years | Job Oriented | No Entrance Exam",
        admission: "Direct admission based on 10th marks / merit",
        branches: [
            { name: "Electrician", img: "https://images.unsplash.com/photo-1621905252507-b35492cc74b4?w=800", duration: "2 Years", salary: "₹18,000 - ₹48,000", jobs: ["Electrical Technician", "Maintenance Electrician", "Solar Installer", "Industrial Electrician"], higher: "Apprenticeship, Diploma (Lateral), Government Jobs" },
            { name: "Fitter", img: "https://trinityiti.co.in/images/FIT.jpg", duration: "2 Years", salary: "₹20,000 - ₹52,000", jobs: ["Machine Fitter", "Tool & Die Maker", "Assembly Technician"], higher: "Diploma, Apprenticeship" },
            { name: "Welder", img: "https://www.rungtacolleges.com/rsr/images/WELDER.png", duration: "1 Year", salary: "₹22,000 - ₹55,000", jobs: ["Industrial Welder", "Fabrication Welder", "Pipeline Welder"], higher: "Advanced Welding Courses" },
            { name: "Computer Operator & Programming Assistant (COPA)", img: "https://images.unsplash.com/photo-1516321497487-e288fb19713f?w=800", duration: "1 Year", salary: "₹16,000 - ₹40,000", jobs: ["Computer Operator", "Data Entry Operator", "Junior Programmer"], higher: "Diploma in Computer Science" }
        ]
    },
    Diploma: {
        icon: "📐",
        title: "Diploma / Polytechnic",
        desc: "3 Years | Technical Education",
        admission: "POLYCET / State Diploma Entrance Exam",
        branches: [
            { name: "Mechanical Engineering", img: "https://exploreengineering.ca/sites/default/files/2020-02/NEM_mechanical.jpg", duration: "3 Years", salary: "₹25,000 - ₹65,000", jobs: ["Junior Engineer", "Production Supervisor", "CAD Designer"], higher: "B.Tech 2nd Year (Lateral Entry), M.Tech, MBA" },
            { name: "Civil Engineering", img: "https://snu.edu.in/site/assets/files/15637/b.tech.civilengineering.1600x0.webp", duration: "3 Years", salary: "₹24,000 - ₹70,000", jobs: ["Site Engineer", "Surveyor", "Construction Manager"], higher: "B.Tech 2nd Year (Lateral), M.Tech" },
            { name: "Computer Science & Engineering", img: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=800", duration: "3 Years", salary: "₹28,000 - ₹75,000", jobs: ["Software Developer", "Network Engineer", "Web Developer"], higher: "B.Tech 2nd Year (Lateral), MCA, M.Tech" },
            { name: "Electronics & Communication", img: "https://images.unsplash.com/photo-1517077304055-6e89abbf09b0?w=800", duration: "3 Years", salary: "₹26,000 - ₹68,000", jobs: ["Electronics Engineer", "Embedded System Developer"], higher: "B.Tech Lateral Entry" }
        ]
    },
    Intermediate: {
        icon: "📖",
        title: "Intermediate (11th + 12th)",
        desc: "2 Years Academic Stream | Direct Admission",
        admission: "Direct based on 10th marks",
        branches: [
            { name: "MPC", img: "https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=800", duration: "2 Years", salary: "₹40,000 - ₹1,80,000+", jobs: ["Software Engineer", "Data Scientist", "Civil Engineer", "Architect"], higher: "B.Tech (JEE), B.Sc, B.Arch, M.Tech, MS, MBA" },
            { name: "BiPC", img: "https://www.siapublishers.com/uploads/2763/920144/81ZFl8JMvlL._SL1500_.jpg", duration: "2 Years", salary: "₹50,000 - ₹2,50,000+", jobs: ["Doctor (MBBS)", "Dentist", "Pharmacist", "Veterinary Doctor"], higher: "MBBS (NEET), B.Pharm, B.Sc Agriculture, M.Sc" },
            { name: "CEC", img: "https://www.theworldfolio.com/img_db/companies/company-5853d987570e7.jpg", duration: "2 Years", salary: "₹35,000 - ₹1,50,000+", jobs: ["Chartered Accountant", "Company Secretary", "Bank Manager"], higher: "CA, CS, B.Com, MBA, CMA" },
            { name: "MEC", img: "https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?w=800", duration: "2 Years", salary: "₹40,000 - ₹1,60,000+", jobs: ["Data Analyst", "Economist", "Actuarial Analyst"], higher: "B.Com, BBA, MBA, CFA" },
            { name: "HEC", img: "https://ignitejuniorcollege.com/wp-content/uploads/2023/11/HEC.png", duration: "2 Years", salary: "₹30,000 - ₹1,20,000+", jobs: ["IAS/IPS Officer", "Journalist", "Teacher", "Lawyer"], higher: "BA, LLB, MA, Civil Services" }
        ]
    },
    Vocational: {
        icon: "🛠️",
        title: "Vocational & Skill Courses",
        desc: "Short Term | Job Ready Courses",
        admission: "Direct Admission",
        branches: [
            { name: "Web Development", img: "https://images.unsplash.com/photo-1517180102446-f3ece451e9d8?w=800", duration: "6-12 Months", salary: "₹25,000 - ₹85,000", jobs: ["Full Stack Developer", "Frontend Developer", "Freelancer"], higher: "Advanced Certification, B.Tech Lateral" },
            { name: "Digital Marketing", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=800", duration: "6-12 Months", salary: "₹22,000 - ₹65,000", jobs: ["Digital Marketer", "SEO Expert", "Social Media Manager"], higher: "Certification Courses" },
            { name: "Hotel Management", img: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=800", duration: "1-2 Years", salary: "₹20,000 - ₹60,000", jobs: ["Hotel Manager", "Chef", "Event Manager"], higher: "Bachelor in Hotel Management" }
        ]
    }
};

let currentPath = null;

function renderPaths() {
    const container = document.getElementById('paths-grid');
    container.innerHTML = '';
    
    Object.keys(pathsData).forEach(key => {
        const p = pathsData[key];
        const card = document.createElement('div');
        card.className = "bg-white rounded-3xl p-6 lg:p-8 text-center card-hover cursor-pointer border border-slate-100 active:scale-95";
        card.innerHTML = `
            <div class="text-6xl lg:text-7xl mb-6 transition-transform hover:scale-110">${p.icon}</div>
            <h3 class="text-xl lg:text-2xl font-bold mb-2">${key}</h3>
            <p class="text-gray-600 text-sm lg:text-base">${p.desc}</p>
        `;
        card.onclick = () => showBranches(key);
        container.appendChild(card);
    });
}

function showBranches(pathKey) {
    currentPath = pathKey;
    const data = pathsData[pathKey];
    
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    
    document.getElementById('step2-title').innerHTML = `
        ${data.icon} ${data.title}<br>
        <span class="text-base lg:text-lg font-normal text-gray-600">${data.desc} • ${data.admission}</span>
    `;
    
    const container = document.getElementById('branches-grid');
    container.innerHTML = '';
    
    data.branches.forEach(branch => {
        const card = document.createElement('div');
        card.className = "bg-white rounded-3xl overflow-hidden card-hover branch-card cursor-pointer border border-slate-100";
        card.innerHTML = `
            <img src="${branch.img}" class="branch-img w-full">
            <div class="p-6 lg:p-8">
                <h4 class="font-bold text-xl lg:text-2xl mb-1">${branch.name}</h4>
                <p class="text-emerald-600 font-medium">${branch.duration}</p>
                <button onclick="showDetail('${branch.name}'); event.stopImmediatePropagation()" 
                        class="mt-6 w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 py-4 rounded-2xl text-white font-semibold text-base lg:text-lg">
                    View Full Details →
                </button>
            </div>
        `;
        container.appendChild(card);
    });
}

function showDetail(branchName) {
    const data = pathsData[currentPath];
    const branch = data.branches.find(b => b.name === branchName);
    
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step3').classList.remove('hidden');
    
    let jobsList = branch.jobs.map(job => `<li class="flex gap-3 items-start"><span class="text-emerald-500 mt-1.5">•</span> ${job}</li>`).join('');
    
    document.getElementById('detail-content').innerHTML = `
        <img src="${branch.img}" class="w-full detail-img object-cover">
        <div class="p-8 lg:p-12">
            <div class="flex flex-col lg:flex-row justify-between items-start gap-6">
                <div>
                    <h2 class="text-3xl lg:text-5xl font-bold">${branch.name}</h2>
                    <p class="text-gray-500 mt-2">${branch.duration} • ${data.admission}</p>
                </div>
                <div class="bg-emerald-50 px-8 py-6 rounded-3xl text-center min-w-[180px]">
                    <p class="text-3xl font-bold text-emerald-600">${branch.salary}</p>
                    <p class="text-sm text-emerald-700">Avg Starting Salary</p>
                </div>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 mt-14">
                <div>
                    <h3 class="text-xl lg:text-2xl font-semibold mb-6 flex items-center gap-3"><i class="fas fa-briefcase"></i> Job Opportunities</h3>
                    <ul class="space-y-5 text-gray-700">${jobsList}</ul>
                </div>
                <div>
                    <h3 class="text-xl lg:text-2xl font-semibold mb-6">🚀 Higher Studies Options</h3>
                    <div class="bg-blue-50 p-8 rounded-3xl">
                        <p class="font-medium text-blue-900">${branch.higher}</p>
                    </div>
                </div>
            </div>
            
            <div class="mt-14 flex flex-col sm:flex-row gap-4">
                <button onclick="goBackToStep2()" class="flex-1 py-5 border-2 border-blue-700 text-blue-700 rounded-3xl font-semibold hover:bg-blue-50">← Explore More Branches</button>
                <button onclick="goHome()" class="flex-1 py-5 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-3xl font-semibold">Back to Home</button>
            </div>
        </div>
    `;
}

function goBack() {
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step1').classList.remove('hidden');
}

function goBackToStep2() {
    document.getElementById('step3').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
}

function goHome() {
    document.getElementById('step3').classList.add('hidden');
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step1').classList.remove('hidden');
}

// Initialize
window.onload = renderPaths;
</script>

<!-- Footer -->
<footer class="bg-white border-t mt-20 py-10">
    <div class="max-w-7xl mx-auto px-6 text-center">
        <p class="text-gray-600 text-sm">
            Made with ❤️ by <span class="font-semibold text-blue-700">M. R. Bharath Kumar</span><br>
            Roll No: 25F45A0506 • Kuppam Engineering College
        </p>
        <p class="text-xs text-gray-400 mt-4">Career Guidance Tool • 2026</p>
    </div>
</footer>
</body>
</html>
